# Główna konfiguracja lintera
linters:
  # Włączone lintery
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - stylecheck
  disable: []

linters-settings:
  errcheck:
    check-type-assertions: true
  revive:
    severity: warning
  stylecheck:
    checks: ["all"]
  goimports:
    local-prefixes: github.com/skni-kod/iot-monitor-backend

issues:
  exclude-use-default: true
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

output:
  formats:
    - format: colored-line-number
      path: stdout
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

run:
  timeout: 5m
  concurrency: 4
  tests: true
  modules-download-mode: readonly
